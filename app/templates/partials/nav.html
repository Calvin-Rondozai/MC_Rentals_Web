{% from "partials/icons.html" import icon %}
<header class="site-header">
  <div class="container nav-bar">
    <a href="{{ url_for('public.home') }}" class="brand">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="{{ site_name }} logo">
      <span>
        MC Properties
        <span class="brand-tagline">{{ site_tagline }}</span>
      </span>
    </a>

    <nav class="nav-links" aria-label="Primary">
      <a href="{{ url_for('public.home') }}" class="{{ 'is-active' if request.endpoint == 'public.home' }}">Home</a>
      <a href="{{ url_for('public.listings') }}" class="{{ 'is-active' if request.endpoint in ('public.listings', 'public.house_detail') }}">Listings</a>
      <a href="{{ url_for('public.home') }}#how-it-works">How It Works</a>
      <a href="{{ url_for('public.home') }}#contact">Contact</a>
    </nav>

    <div class="nav-actions">
      <button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle dark mode">
        {{ icon('sun', 'icon icon-sun') }}
      </button>
      <a href="{{ url_for('public.listings') }}" class="btn btn-primary">
        {{ icon('search') }}
        <span>Browse Homes</span>
      </a>
      <button class="nav-toggle" data-nav-toggle type="button" aria-label="Open menu" aria-expanded="false">
        {{ icon('menu') }}
      </button>
    </div>
  </div>
</header>

<div class="mobile-drawer" data-mobile-drawer data-open="false">
  <div class="mobile-drawer-backdrop"></div>
  <div class="mobile-drawer-panel" role="dialog" aria-modal="true" aria-label="Menu">
    <button class="mobile-drawer-close" data-drawer-close type="button" aria-label="Close menu">
      {{ icon('close') }}
    </button>
    <a href="{{ url_for('public.home') }}">Home</a>
    <a href="{{ url_for('public.listings') }}">Listings</a>
    <a href="{{ url_for('public.home') }}#how-it-works">How It Works</a>
    <a href="{{ url_for('public.home') }}#contact">Contact</a>
    <a href="{{ url_for('auth.login') }}" class="text-muted">Admin Login</a>
  </div>
</div>
